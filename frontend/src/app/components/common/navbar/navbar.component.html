<header class="sticky top-0 z-50 w-full bg-white shadow-sm">
  <div class="container mx-auto flex h-16 items-center justify-between px-4">
    <!-- Logo -->
    <div class="flex items-center gap-2">
      <div class="flex h-10 w-10 items-center justify-center rounded-lg bg-primary">
        <!-- Football SVG -->
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" stroke="white" stroke-width="2" fill="none" />
          <path d="M12 2v20M2 12h20" stroke="white" stroke-width="1" />
        </svg>
      </div>
      <span class="hidden md:block">Football Fields</span>
    </div>

    <!-- Desktop Navigation -->
    <nav class="hidden md:flex items-center gap-6">
      @for (item of navItems(); track item) {
      <button (click)="onNavigate.emit(item.id)" class="flex items-center gap-2 px-3 py-2 rounded-md transition-colors">
        @if (item.icon) {
        <span>icon</span>
        }
        {{ item.label }}
      </button>
      }
    </nav>


    <!-- Right Section -->
    <div class="flex items-center gap-3">
      <!-- NotificationSystem (créé en composant si besoin) -->
      @if(currentUser()){
      <ng-container>
        <!-- <app-notification-system [language]="language()"></app-notification-system> -->
      </ng-container>
      }


      <!-- Language Selector -->
      <!-- <div class="relative">
        <button class="border rounded p-2" (click)="showLangMenu = !showLangMenu">
          <span>icon</span>
        </button>
        <div class="absolute right-0 bg-white border rounded shadow">
          <button class="block px-4 py-2" (click)="onLanguageChange.emit('fr')">🇫🇷 Français</button>
          <button class="block px-4 py-2" (click)="onLanguageChange.emit('en')">🇬🇧 English</button>
          <button class="block px-4 py-2" (click)="onLanguageChange.emit('ar')">🇸🇦 العربية</button>
        </div>
      </div> -->

      <!-- User Menu -->
      @if(currentUser()){
      <div class="relative">
        <button class="border rounded flex items-center gap-2 p-2">
          <span>icon</span>
          <span class="hidden md:inline">{{ currentUser()?.name }}</span>
        </button>
        <div class="absolute right-0 bg-white border rounded shadow">
          <button class="flex items-center p-2" (click)="onNavigate.emit('profile')">
            <span>icon</span>
            <span class='mr-2'>profile</span>
          </button>
          <button class="flex items-center p-2" (click)="onLogout.emit()">
            <span>icon</span>
            <span class="mr-2">logout</span>
          </button>
        </div>
      </div>
      }
      @else{
      <ng-template #loginBtn>
        <button (click)="onLogin.emit()" class="border rounded p-2">login</button>
      </ng-template>
      }


      <!-- Menu mobile, drawer custom à coder selon tes besoins -->
    </div>
  </div>
</header>
