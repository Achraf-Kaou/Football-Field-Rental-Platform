<div class="flex h-screen overflow-hidden bg-background">
    <!-- Sidebar Component -->
    <app-manager-sidebar (collapsedOutput)="onSidebarCollapse($event)"></app-manager-sidebar>

    <!-- Main Content Area -->
    <div class="flex-1 flex flex-col overflow-hidden transition-all duration-400"
        [class.ml-[284px]]="!isSidebarCollapsed() && !isMobileView()"
        [class.ml-[96px]]="isSidebarCollapsed() && !isMobileView()">
        
        <!-- Top Bar with Toggle Button (visible when sidebar is collapsed) -->
         @if (isMobileView()) {
        <div class="sticky top-0 z-40 bg-background/80 backdrop-blur-lg border-b border-white/10">
            <div class="flex items-center h-16 px-4 ">
                <!-- Sidebar Toggle Button (visible when collapsed) -->
                <button 
                    *ngIf="isSidebarCollapsed() && isMobileView()"
                    (click)="toggleSidebar()"
                    class="w-10 h-10 rounded-lg bg-surface-card border border-white/10 flex items-center justify-center hover:bg-white/10 hover:border-primary transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-background"
                    aria-label="Open sidebar"
                    type="button">
                    <span class="material-icons text-text-primary">menu</span>
                </button>
                
                <!-- Page Title or Breadcrumbs (optional) -->
                <div class="flex-1">
                    <ng-content select="[slot='header']"></ng-content>
                </div>
            </div>
        </div>
    }

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto">
            <div class="px-4 md:px-6 lg:px-8 py-4 md:py-6">
                <ng-content></ng-content>
            </div>
        </main>
    </div>

    <!-- Mobile Overlay (when sidebar is open on mobile) -->
    <div 
        *ngIf="!isSidebarCollapsed() && isMobileView()"
        (click)="toggleSidebar()"
        class="fixed inset-0 bg-black/50 backdrop-blur-sm z-30 md:hidden"
        aria-hidden="true"></div>
</div>
