<app-navbar-main></app-navbar-main>
<div class="min-h-screen bg-background flex items-center justify-center pt-24 pb-12 px-4">
  <div
    class="max-w-md w-full bg-surface p-8 rounded-2xl shadow-2xl border border-gray-200 dark:border-white/10 transition-all">

    <!-- Tabs -->
    <div
      class="grid grid-cols-2 gap-2 mb-6 bg-gray-100 dark:bg-surface-card p-1 rounded-xl border border-gray-200 dark:border-white/5">
      <button (click)="switchMode('login')" id="loginTab"
        class="py-3 rounded-lg font-semibold transition-all text-black dark:text-white"
        [class]="mode() == 'login' ? 'bg-white dark:bg-surface-dark !text-black shadow-sm border border-gray-200 dark:border-white/10' : ''">
        Login
      </button>
      <button (click)="switchMode('signup')" id="signupTab"
        class="py-3 rounded-lg font-semibold transition-all text-black dark:text-white"
        [class]="mode() == 'signup' ? 'bg-white dark:bg-surface-dark !text-black shadow-sm border border-gray-200 dark:border-white/10' : ''">
        Register
      </button>
    </div>

    <!-- Login Form -->
    @if(mode() == "login") {
    <div id="loginForm" class="animate-fade-in">
      <h3 class="text-lg font-semibold mb-6 text-center text-gray-900 dark:text-white">
        Welcome back! Please sign in to continue
      </h3>

      <button (click)="handleGoogleLogin()"
        class="w-full bg-gray-50 dark:bg-white/5 hover:bg-gray-100 dark:hover:bg-white/10 flex items-center justify-center gap-3 h-12 rounded-xl border border-gray-200 dark:border-white/10 transition-all hover:scale-[1.02] hover:shadow-lg group">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path
            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
            fill="#4285F4" />
          <path
            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
            fill="#34A853" />
          <path
            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
            fill="#FBBC05" />
          <path
            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
            fill="#EA4335" />
        </svg>
        <span class="text-gray-900 dark:text-white font-semibold">Continue with Google</span>
      </button>

      <div class="flex items-center gap-4 w-full my-6">
        <div class="flex-1 h-px bg-gray-200 dark:bg-white/10"></div>
        <p class="text-sm text-gray-500 dark:text-gray-400">or sign in with email</p>
        <div class="flex-1 h-px bg-gray-200 dark:bg-white/10"></div>
      </div>

      <div class="space-y-4">
        <div>
          <label class="block font-medium mb-2 text-gray-900 dark:text-white">Email</label>
          <input type="email" placeholder="Enter your email" [field]="loginForm.email"
            class="w-full px-4 py-3 rounded-xl bg-gray-50 dark:bg-surface-card border border-gray-200 dark:border-white/10 text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all" />
        </div>

        <div>
          <label class="block font-medium mb-2 text-gray-900 dark:text-white">Password</label>
          <input type="password" placeholder="Enter your password" [field]="loginForm.password"
            class="w-full px-4 py-3 rounded-xl bg-gray-50 dark:bg-surface-card border border-gray-200 dark:border-white/10 text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all" />
        </div>

        <div class="flex items-center justify-between text-sm">
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" class="w-4 h-4 rounded border-gray-300 text-primary focus:ring-primary">
            <span class="text-gray-600 dark:text-gray-400">Remember me</span>
          </label>
          <a href="#" class="text-primary hover:text-green-400 font-semibold transition-colors">Forgot password?</a>
        </div>

        <button (click)="handleLogin()"
          class="w-full bg-primary hover:bg-green-400 text-background-dark py-3 rounded-xl font-bold shadow-lg shadow-primary/30 hover:shadow-xl hover:shadow-primary/40 transition-all hover:scale-[1.02] active:scale-95">
          Sign In
        </button>
      </div>
    </div>
    }
    <!-- Registration Form -->
    @if(mode() == "signup") {
    <div id="signupForm" class="animate-fade-in">
      <h3 class="text-lg font-semibold mb-6 text-center text-gray-900 dark:text-white">
        Welcome! Please sign up to continue
      </h3>

      <button (click)="handleGoogleLogin()"
        class="w-full bg-gray-50 dark:bg-white/5 hover:bg-gray-100 dark:hover:bg-white/10 flex items-center justify-center gap-3 h-12 rounded-xl border border-gray-200 dark:border-white/10 transition-all hover:scale-[1.02] hover:shadow-lg group">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path
            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
            fill="#4285F4" />
          <path
            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
            fill="#34A853" />
          <path
            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
            fill="#FBBC05" />
          <path
            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
            fill="#EA4335" />
        </svg>
        <span class="text-gray-900 dark:text-white font-semibold">Continue with Google</span>
      </button>

      <div class="flex items-center gap-4 w-full my-6">
        <div class="flex-1 h-px bg-gray-200 dark:bg-white/10"></div>
        <p class="text-sm text-gray-500 dark:text-gray-400">or sign up with email</p>
        <div class="flex-1 h-px bg-gray-200 dark:bg-white/10"></div>
      </div>

      <div class="space-y-4">
        <!-- Role Selection -->
        <div>
          <label class="block font-medium mb-3 text-gray-900 dark:text-white">Register as</label>
          <div class="grid grid-cols-2 gap-3">
            <button type="button" (click)="setRole('USER')"
              [class]="registerModel().role === 'USER' ? 'bg-primary text-white border-primary' : 'bg-gray-50 dark:bg-surface-card text-gray-900 dark:text-white border-gray-200 dark:border-white/10'"
              class="px-4 py-3 rounded-xl border-2 font-semibold transition-all hover:scale-[1.02] focus:outline-none focus:ring-2 focus:ring-primary">
              User
            </button>
            <button type="button" (click)="setRole('MANAGER')"
              [class]="registerModel().role === 'MANAGER' ? 'bg-primary text-white border-primary' : 'bg-gray-50 dark:bg-surface-card text-gray-900 dark:text-white border-gray-200 dark:border-white/10'"
              class="px-4 py-3 rounded-xl border-2 font-semibold transition-all hover:scale-[1.02] focus:outline-none focus:ring-2 focus:ring-primary">
              Manager
            </button>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block font-medium mb-2 text-gray-900 dark:text-white">First name</label>
            <input type="text" placeholder="First name" [field]="registerForm.firstName"
              class="w-full px-4 py-3 rounded-xl bg-gray-50 dark:bg-surface-card border border-gray-200 dark:border-white/10 text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all" />
          </div>
          <div>
            <label class="block font-medium mb-2 text-gray-900 dark:text-white">Last name</label>
            <input type="text" placeholder="Last name" [field]="registerForm.lastName"
              class="w-full px-4 py-3 rounded-xl bg-gray-50 dark:bg-surface-card border border-gray-200 dark:border-white/10 text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all" />
          </div>
        </div>

        <div>
          <label class="block font-medium mb-2 text-gray-900 dark:text-white">Email</label>
          <input type="email" placeholder="Enter your email" [field]="registerForm.email"
            class="w-full px-4 py-3 rounded-xl bg-gray-50 dark:bg-surface-card border border-gray-200 dark:border-white/10 text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all" />
        </div>

        <div>
          <label class="block font-medium mb-2 text-gray-900 dark:text-white">Phone number</label>
          <input type="text" placeholder="Enter your phone number" [field]="registerForm.phone"
            class="w-full px-4 py-3 rounded-xl bg-gray-50 dark:bg-surface-card border border-gray-200 dark:border-white/10 text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all" />
        </div>

        <div>
          <label class="block font-medium mb-2 text-gray-900 dark:text-white">Password</label>
          <input type="password" placeholder="Create a password" [field]="registerForm.password"
            class="w-full px-4 py-3 rounded-xl bg-gray-50 dark:bg-surface-card border border-gray-200 dark:border-white/10 text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all" />
        </div>

        <button (click)="handleSignup()"
          class="w-full bg-primary hover:bg-green-400 text-background-dark py-3 rounded-xl font-bold shadow-lg shadow-primary/30 hover:shadow-xl hover:shadow-primary/40 transition-all hover:scale-[1.02] active:scale-95">
          Create Account
        </button>
      </div>
    </div>
    }
  </div>
</div>
