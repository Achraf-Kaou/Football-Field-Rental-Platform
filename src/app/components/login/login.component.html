<div class="min-h-screen flex items-center justify-center py-12 bg-gray-200">
  <div class="max-w-md w-full bg-white p-8 rounded-lg shadow">
    <!-- Logo -->
    <div class="flex flex-col items-center mb-4">
      <div class="flex items-center justify-center h-16 w-16 rounded-lg bg-green-600 mb-4">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" stroke="white" stroke-width="2" fill="none"/>
          <path d="M12 2v20M2 12h20" stroke="white" stroke-width="1"/>
        </svg>
      </div>
      <div class="text-center text-lg font-semibold">Football Fields</div>
    </div>

    <!-- Tabs -->
    <div class="grid grid-cols-2 gap-2 mb-4 bg-gray-50 rounded">
      <button (click)="mode.set('login')" [class.bg-white-600]="mode() === 'login'" [class.bg-gray-200]="mode() === 'signup'" class="py-1 rounded font-medium">
        Connexion
      </button>
      <button (click)="mode.set('signup')" [class.bg-white-600]="mode() === 'signup'" [class.bg-gray-200]="mode() === 'login'" class="py-1 rounded font-medium">
        Inscription
      </button>
    </div>

    <!-- Login Form -->
    @if(mode() === 'login'){
    <div>
      <label class="block  font-medium mb-1">Email</label>
      <input type="email" [(ngModel)]="email" placeholder="Email" class="w-full px-3 py-2 rounded border mb-4 bg-gray-100"/>

      <label class="block  font-medium mb-1">Mot de passe</label>
      <input type="password" [(ngModel)]="password" placeholder="Mot de passe" class="w-full px-3 py-2 rounded border mb-4 bg-gray-100"/>

      <button (click)="handleLogin()" class="w-full bg-green-600 text-white py-2 rounded font-semibold mb-2">Connexion</button>
      
    </div>
}

    <!-- Registration Form -->
    @if(mode() === 'signup'){
        <div>
      <label class="block  font-medium mb-1">Nom complet</label>
      <input type="text" [(ngModel)]="name" placeholder="Nom complet" class="w-full px-3 py-2 rounded border mb-4 bg-gray-100"/>

      <label class="block  font-medium mb-1">Email</label>
      <input type="email" [(ngModel)]="email" placeholder="Email" class="w-full px-3 py-2 rounded border mb-4 bg-gray-100"/>

      <label class="block  font-medium mb-1">Téléphone</label>
      <input type="tel" [(ngModel)]="phone" placeholder="Téléphone" class="w-full px-3 py-2 rounded border mb-4 bg-gray-100"/>

      <label class="block  font-medium mb-1">Mot de passe</label>
      <input type="password" [(ngModel)]="password" placeholder="Mot de passe" class="w-full px-3 py-2 rounded border mb-4 bg-gray-100"/>

      <button (click)="handleSignup()" class="w-full bg-green-600 text-white py-2 rounded font-semibold">Inscription</button>
    </div>
    }
  </div>
</div>
