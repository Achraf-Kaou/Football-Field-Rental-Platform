<div class="min-h-screen flex items-center justify-center py-12 bg-gray-200">
  <div class="max-w-md w-full bg-white p-8 rounded-lg shadow">
    <!-- Logo -->
    <div class="flex flex-col items-center mb-4">
      <div class="flex items-center justify-center h-16 w-16 rounded-lg bg-green-600 mb-4">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" stroke="white" stroke-width="2" fill="none" />
          <path d="M12 2v20M2 12h20" stroke="white" stroke-width="1" />
        </svg>
      </div>
      <div class="text-center text-lg font-semibold">Takwirti</div>
    </div>

    <!-- Tabs -->
    <div class="grid grid-cols-2 gap-2 mb-4 bg-gray-50 rounded">
      <button (click)="mode.set('login')" [class.bg-white-600]="mode() === 'login'"
        [class.bg-gray-200]="mode() === 'signup'" class="py-1 rounded font-medium">
        Login
      </button>
      <button (click)="mode.set('signup')" [class.bg-white-600]="mode() === 'signup'"
        [class.bg-gray-200]="mode() === 'login'" class="py-1 rounded font-medium">
        Register
      </button>
    </div>

    <!-- Login Form -->
    @if(mode() === 'login'){
    <div>
      <h3 class="text-lg font-semibold mb-3 text-center">Welcome back! Please sign in to continue</h3>

      <button (click)="handleGoogleLogin()"
        class="w-full mt-8 bg-gray-500/10 flex items-center justify-center h-12 rounded-full">
        <img src="https://raw.githubusercontent.com/prebuiltui/prebuiltui/main/assets/login/googleLogo.svg"
          alt="googleLogo">
      </button>

      <div class="flex items-center gap-4 w-full my-5">
        <div class="w-full h-px bg-gray-300/90"></div>
        <p class="w-full text-nowrap text-sm text-gray-500/90">or sign in with email</p>
        <div class="w-full h-px bg-gray-300/90"></div>
      </div>
    </div>
    <div>
      <label class="block  font-medium mb-1">Email</label>
      <input type="email" [(ngModel)]="email" placeholder="Email"
        class="w-full px-3 py-2 rounded  mb-4 bg-gray-100" />

      <label class="block  font-medium mb-1">Password</label>
      <input type="password" [(ngModel)]="password" placeholder="Password"
        class="w-full px-3 py-2 rounded  mb-4 bg-gray-100" />

      <button (click)="handleLogin()"
        class="w-full bg-green-600 text-white py-2 rounded font-semibold mb-2">Login</button>

    </div>
    }

    <!-- Registration Form -->
    @if(mode() === 'signup'){
    <div>
      <h3 class="text-lg font-semibold mb-3 text-center">Welcome! Please sign up to continue</h3>

      <button (click)="handleGoogleLogin()"
        class="w-full mt-8 bg-gray-500/10 flex items-center justify-center h-12 rounded-full">
        <img src="https://raw.githubusercontent.com/prebuiltui/prebuiltui/main/assets/login/googleLogo.svg"
          alt="googleLogo">
      </button>

      <div class="flex items-center gap-4 w-full my-5">
        <div class="w-full h-px bg-gray-300/90"></div>
        <p class="w-full text-nowrap text-sm text-gray-500/90">or sign up with email</p>
        <div class="w-full h-px bg-gray-300/90"></div>
      </div>
    </div>
    <div>
      <label class="block  font-medium mb-1">First name</label>
      <input type="text" [(ngModel)]="firstName" placeholder="First name"
        class="w-full px-3 py-2 rounded  mb-4 bg-gray-100" />

      <label class="block  font-medium mb-1">Last name</label>
      <input type="text" [(ngModel)]="lastName" placeholder="Last name"
        class="w-full px-3 py-2 rounded  mb-4 bg-gray-100" />

      <label class="block  font-medium mb-1">Email</label>
      <input type="email" [(ngModel)]="email" placeholder="Email"
        class="w-full px-3 py-2 rounded  mb-4 bg-gray-100" />

      <label class="block  font-medium mb-1">Phone number</label>
      <input type="tel" [(ngModel)]="phone" placeholder="Phone number"
        class="w-full px-3 py-2 rounded  mb-4 bg-gray-100" />

      <label class="block  font-medium mb-1">Password</label>
      <input type="password" [(ngModel)]="password" placeholder="Password"
        class="w-full px-3 py-2 rounded  mb-4 bg-gray-100" />

      <button (click)="handleSignup()"
        class="w-full bg-green-600 text-white py-2 rounded font-semibold">Register</button>
    </div>
    }
  </div>
</div>
