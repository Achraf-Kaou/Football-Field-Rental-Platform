<div class="fixed top-4 right-4 z-99 flex flex-col gap-2 min-w-[300px] max-w-[500px]">
  @for (toast of toasts(); track toast.id) {
  <div @toastAnimation
    class="flex items-center w-full p-4 text-gray-800 bg-white rounded-lg shadow-lg border border-gray-200"
    role="alert">
    <div
      [class]="'inline-flex items-center justify-center flex-shrink-0 w-8 h-8 rounded-lg ' + getConfig(toast.type).iconClass">
      <svg class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="currentColor"
        viewBox="0 0 20 20">
        <path [attr.d]="getConfig(toast.type).icon" />
      </svg>
      <span class="sr-only">{{ toast.type }} icon</span>
    </div>

    <div class="ms-3 text-sm font-normal flex-1">
      {{ toast.message }}
    </div>

    <button type="button" (click)="removeToast(toast.id)"
      class="ms-auto -mx-1.5 -my-1.5 bg-white text-gray-400 hover:text-gray-900 rounded-lg focus:ring-2 focus:ring-gray-300 p-1.5 hover:bg-gray-100 inline-flex items-center justify-center h-8 w-8"
      [attr.aria-label]="'Close ' + toast.type + ' notification'">
      <span class="sr-only">Close</span>
      <svg class="w-3 h-3" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 14 14">
        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6" />
      </svg>
    </button>
  </div>
  }
</div>
